server:
  port: 8083

spring:
  application:
    name: ms-bodega

  datasource:
    # Actualizado con la ruta interna del classpath de ms-bodega
    url: ${DB_URL:jdbc:oracle:thin:@y9yihlwya0utl6x4_medium?TNS_ADMIN=/Users/danielguzman/Desktop/Luxury_Sales/Luxury_Sales/ms-bodega/src/main/resources/wallet}
    username: ${DB_USERNAME:ADMIN}
    password: ${DB_PASSWORD:FullStack-001}
    driver-class-name: oracle.jdbc.OracleDriver

    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  jpa:
    database: oracle
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

app:
  urls:
    ms-producto: ${MS_PRODUCTO_URL:http://localhost:8082}

# Propiedades de Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Configuración Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

  instance:
    instance-id: ${spring.application.name}:${server.port}